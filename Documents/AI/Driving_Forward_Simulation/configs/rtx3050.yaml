# RTX 3050 (4 GB VRAM) – memory-optimised configuration
# Inherits from base.yaml; only overrides are listed.
# Strategy:
#   • SF mode (single-frame inference, one image at a time)
#   • Resolution 114×228 instead of 352×640  (–75 % pixel count)
#   • FP16 AMP                               (–50 % memory)
#   • Gradient checkpointing                 (trade compute for memory)
#   • Batch size 1 + accumulation steps 8    (effective batch 8)
#   • ResNet-18 backbone instead of ResNet-50
#   • Reduced number of Gaussian primitives

# ── Dataset ──────────────────────────────────────────────────────────────────
dataset:
  name: nuscenes
  root: data/nuscenes
  version: v1.0-mini
  cameras:
    - CAM_FRONT
    - CAM_FRONT_RIGHT
    - CAM_BACK_RIGHT
    - CAM_BACK
    - CAM_BACK_LEFT
    - CAM_FRONT_LEFT
  image_height: 228
  image_width:  400
  num_temporal_frames: 3

# ── Model ─────────────────────────────────────────────────────────────────────
model:
  backbone: resnet18           # lighter backbone
  pretrained: true
  min_depth: 0.1
  max_depth: 80.0
  num_sh_degree: 1             # degree-1 SH (4 coefficients vs 16) saves memory
  gaussian_scale_min: 0.001
  gaussian_scale_max: 1.0
  mode: SF

# ── Training ──────────────────────────────────────────────────────────────────
training:
  batch_size: 1
  num_workers: 4
  epochs: 130
  lr: 0.0001
  lr_backbone: 0.00001
  weight_decay: 0.0001
  warmup_steps: 200
  scheduler: cosine
  gradient_clip: 1.0
  amp: true                    # CRITICAL: must be true for 4 GB VRAM
  accum_steps: 8               # effective batch = 8
  grad_checkpoint: true        # CRITICAL: reduces activation memory

# ── Loss weights (same as paper) ──────────────────────────────────────────────
loss:
  lambda_repro: 1.0
  lambda_sp: 0.5
  lambda_sp_tm: 0.5
  lambda_smooth: 0.001
  lambda_render: 5.0
  lambda_colour: 2.0
  lambda_lpips: 0.05
  ssim_weight: 0.85

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  log_dir: outputs/logs
  checkpoint_dir: checkpoints
  save_every: 1
  log_every: 50
  val_every: 1
  num_val_scenes: 5
